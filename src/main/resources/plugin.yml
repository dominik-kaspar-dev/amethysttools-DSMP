name: AmethystTools
version: 1.1.0
main: com.amethysttools.AmethystToolsPlugin
api-version: "1.21.11"
authors: [ItsMeVali]
commands:
  amethysttools:
    description: Admin command for AmethystTools
    usage: /at <give|reload>
    aliases: [at, atools]
permissions:
  amethysttools.use:
    description: Allows using the Amethyst Pickaxe 3x3 mining
    default: true
  amethysttools.admin:
    description: Allows giving tools and reloading config
    default: op
